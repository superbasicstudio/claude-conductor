version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      production-deps:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"
      dev-deps:
        dependency-type: development
        update-types:
          - "minor"
          - "patch"
    security-updates-only: false
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
